<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>چارت طلا - بازار جهانی</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #e9edf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 30px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12), 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 0 8px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title .gold-icon {
            font-size: 2.2rem;
            line-height: 1;
        }

        .header-title h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1a2639, #2c3e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title h1 span {
            font-weight: 300;
            -webkit-text-fill-color: #b8860b;
            background: none;
        }

        .header-badge {
            background: rgba(212, 175, 55, 0.15);
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            font-size: 0.9rem;
            font-weight: 500;
            color: #5a4a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-badge .dot {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { opacity: 0.6; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.15); }
            100% { opacity: 0.6; transform: scale(0.95); }
        }

        .widget-wrapper {
            border-radius: 28px;
            overflow: hidden;
            background: #ffffff;
            border: 1px solid rgba(255,255,255,0.7);
            min-height: 400px;
            position: relative;
        }

        #bitycle-ac-widget {
            width: 100% !important;
            height: 550px !important;
            display: block;
        }

        /* استایل برای زمانی که ویجت لود نشده */
        .widget-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #8892a0;
            font-size: 0.95rem;
            text-align: center;
            pointer-events: none;
        }
        .widget-placeholder .loader {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e9edf5;
            border-top: 3px solid #b8860b;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 22px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            color: #4a5568;
            font-size: 0.85rem;
        }

        .footer .brand {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.7;
        }

        .footer .brand:hover {
            opacity: 1;
        }

        .footer .brand strong {
            font-weight: 700;
            color: #1a2639;
        }

        .footer .update-info {
            background: rgba(0,0,0,0.02);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        @media (max-width: 700px) {
            .card {
                padding: 18px 15px 25px;
                border-radius: 32px;
            }
            .header-title h1 {
                font-size: 1.5rem;
            }
            #bitycle-ac-widget {
                height: 400px !important;
            }
            .footer {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            #bitycle-ac-widget {
                height: 340px !important;
            }
            .card {
                padding: 12px 10px 18px;
                border-radius: 24px;
            }
            .header-title h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="header-title">
                <span class="gold-icon">🏆</span>
                <h1>طلا <span>XAUUSD</span></h1>
            </div>
            <div class="header-badge">
                <span class="dot"></span>
                بازار زنده
            </div>
        </div>

        <div class="widget-wrapper">
            <!-- المان ویجت -->
            <div id="bitycle-ac-widget"></div>
            <!-- پلاس‌هولدر (تا وقتی ویجت لود نشده) -->
            <div class="widget-placeholder" id="widgetPlaceholder">
                <div class="loader"></div>
                <div>در حال بارگذاری چارت...</div>
            </div>
        </div>

        <div class="footer">
            <div class="brand">
                <span>⚡</span>
                <span>تحلیل توسط <strong>Bitycle</strong></span>
            </div>
            <div class="update-info">
                <i>🔄</i>
                <span>به‌روزرسانی لحظه‌ای · <span id="timeDisplay"></span></span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ===== ۱. حذف پلاس‌هولدر وقتی ویجت لود شد =====
            const placeholder = document.getElementById('widgetPlaceholder');

            // ===== ۲. ایجاد المنت اسکریپت =====
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://widget.bitycle.com/static/script/v1/script.js';
            script.async = true;

            // ===== ۳. کانفیگ =====
            const config = {
                id: "bitycle-ac-widget",
                theme: "bitycle",
                type: "ac",
                locale: "fa",
                mode: "light",
                style: "tradingview",
                datafeed_type: "general",
                symbol: "FX:XAUUSD",
                interval: "5",
                disabled_features: [],
                enabled_features: ["replay"],
                calendar_type: "miladi",
                chart_style: "Candle"
            };

            // ===== ۴. مقداردهی =====
            // روش درست: استفاده از textContent با JSON
            script.textContent = JSON.stringify(config);

            // ===== ۵. اون‌لود =====
            script.onload = function() {
                // ویجت لود شد → پلاس‌هولدر رو مخفی کن
                if (placeholder) {
                    placeholder.style.display = 'none';
                }
            };

            script.onerror = function() {
                // اگر ویجت لود نشد، پیام خطا نشون بده
                if (placeholder) {
                    placeholder.innerHTML = `
                        <div style="color:#c0392b; font-size:0.95rem;">
                            ⚠️ خطا در بارگذاری ویجت<br>
                            <span style="font-size:0.8rem; color:#7f8c8d;">لطفاً اتصال اینترنت را بررسی کنید</span>
                        </div>
                    `;
                }
            };

            // ===== ۶. اضافه کردن به صفحه =====
            document.body.appendChild(script);

            // ===== ۷. نمایش زمان =====
            function updateTime() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const el = document.getElementById('timeDisplay');
                if (el) el.textContent = timeStr;
            }
            updateTime();
            setInterval(updateTime, 1000);

        })();
    </script>

</body>
</html>
