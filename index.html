<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>چارت طلا - بازار جهانی</title>
    <!-- فونت وزیرمتن -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #e9edf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== کارت اصلی ===== */
        .card {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 30px 30px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12), 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        /* ===== هدر ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 0 8px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title .gold-icon {
            font-size: 2.2rem;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(218, 165, 32, 0.3));
        }

        .header-title h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1a2639, #2c3e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-title h1 span {
            font-weight: 300;
            -webkit-text-fill-color: #b8860b;
            background: none;
        }

        .header-badge {
            background: rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            font-size: 0.9rem;
            font-weight: 500;
            color: #5a4a1a;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .header-badge .dot {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0% { opacity: 0.6; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.15); }
            100% { opacity: 0.6; transform: scale(0.95); }
        }

        /* ===== ویجت ===== */
        .widget-wrapper {
            border-radius: 28px;
            overflow: hidden;
            background: #ffffff;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.02), 0 10px 25px -8px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.7);
            transition: box-shadow 0.25s;
        }

        .widget-wrapper:hover {
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
        }

        #bitycle-ac-widget {
            width: 100% !important;
            height: 550px !important;
            display: block;
        }

        /* ===== فوتر ===== */
        .footer {
            margin-top: 22px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            color: #4a5568;
            font-size: 0.85rem;
        }

        .footer .brand {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .footer .brand:hover {
            opacity: 1;
        }

        .footer .brand strong {
            font-weight: 700;
            color: #1a2639;
        }

        .footer .update-info {
            background: rgba(0,0,0,0.02);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer .update-info i {
            font-style: normal;
            font-size: 1rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .card {
                padding: 18px 15px 25px;
                border-radius: 32px;
            }

            .header-title h1 {
                font-size: 1.5rem;
            }

            .header-title .gold-icon {
                font-size: 1.8rem;
            }

            .header-badge {
                font-size: 0.75rem;
                padding: 5px 14px;
            }

            #bitycle-ac-widget {
                height: 400px !important;
            }

            .footer {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
                font-size: 0.75rem;
            }

            .footer .update-info {
                padding: 2px 12px;
            }
        }

        @media (max-width: 480px) {
            #bitycle-ac-widget {
                height: 340px !important;
            }

            .card {
                padding: 12px 10px 18px;
                border-radius: 24px;
            }

            .header {
                margin-bottom: 16px;
            }

            .header-title h1 {
                font-size: 1.2rem;
            }
        }

        /* ===== اسکرول نرم ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.12);
            border-radius: 12px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- HEADER -->
        <div class="header">
            <div class="header-title">
                <span class="gold-icon">🏆</span>
                <h1>طلا <span>XAUUSD</span></h1>
            </div>
            <div class="header-badge">
                <span class="dot"></span>
                بازار زنده
            </div>
        </div>

        <!-- ویجت -->
        <div class="widget-wrapper">
            <div id="bitycle-ac-widget" style="width: 100%; height: 550px"></div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <div class="brand">
                <span>⚡</span>
                <span>تحلیل توسط <strong>Bitycle</strong></span>
            </div>
            <div class="update-info">
                <i>🔄</i>
                <span>به‌روزرسانی لحظه‌ای · <span id="timeDisplay"></span></span>
            </div>
        </div>
    </div>

    <!-- اسکریپت ویجت با کانفیگ -->
    <script type="text/javascript">
        (function() {
            // === ۱. ایجاد المنت اسکریپت ===
            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://widget.bitycle.com/static/script/v1/script.js';
            script.async = true;

            // === ۲. دیتای کانفیگ (دقیقاً مطابق خواسته) ===
            const config = {
                id: "bitycle-ac-widget",
                theme: "bitycle",
                type: "ac",
                locale: "fa",
                mode: "light",
                style: "tradingview",
                datafeed_type: "general",
                symbol: "FX:XAUUSD",
                interval: "5",
                disabled_features: [],
                enabled_features: ["replay"],
                calendar_type: "miladi",
                chart_style: "Candle"
            };

            // === ۳. تبدیل به JSON و قرار دادن در attribute ===
            script.textContent = JSON.stringify(config);

            // === ۴. اپند به داکیومنت ===
            document.body.appendChild(script);

            // === ۵. نمایش زمان (تزیینی) ===
            function updateTime() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const el = document.getElementById('timeDisplay');
                if (el) el.textContent = timeStr;
            }
            updateTime();
            setInterval(updateTime, 1000);

        })();
    </script>

</body>
</html>
